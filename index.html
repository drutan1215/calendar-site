<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paradise Sports Performance — Book a Session</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header h1 span {
      color: #f97316;
    }

    header p {
      margin-top: 0.5rem;
      color: #888;
      font-size: 0.95rem;
    }

    .section-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f97316;
      margin: 2.5rem 0 1rem;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto 2rem;
      padding: 0 1.5rem;
    }

    .cards.single {
      grid-template-columns: 1fr;
      max-width: 600px;
    }

    @media (max-width: 768px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      text-align: center;
    }

    .location-badge {
      background: #f97316;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .btn {
      display: inline-block;
      background: #f97316;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #ea6a0a;
    }
  </style>
</head>
<body>

  <header>
    <h1>Paradise <span>Sports Performance</span></h1>
    <p>Select a session type and location to book your training</p>
  </header>

  <p class="section-label">Football Skills Training</p>
  <div class="cards single">
    <div class="card">
      <span class="location-badge">FB</span>
      <h2>Football Skills Training</h2>
      <a class="btn" href="https://tidycal.com/paradise-sports-performance/football-skills-training" target="_blank" rel="noopener">Schedule Your Session</a>
    </div>
  </div>

  <p class="section-label">Athlete Training — Pick Your Location</p>
  <div class="cards">
    <div class="card">
      <span class="location-badge">WV</span>
      <h2>West Virginia</h2>
      <a class="btn" href="https://tidycal.com/paradise-sports-performance/athlete-training-wv" target="_blank" rel="noopener">Schedule Your Session</a>
    </div>

    <div class="card">
      <span class="location-badge">OH</span>
      <h2>Ohio</h2>
      <a class="btn" href="https://tidycal.com/paradise-sports-performance/athlete-training-oh" target="_blank" rel="noopener">Schedule Your Session</a>
    </div>
  </div>

</body>
</html>
